<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Opiniones | Los Cócteles de Willian FP</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .contenedor { max-width: 600px; margin: auto; border: 2px solid #FFD700; padding: 20px; border-radius: 8px; }
        h1 { color: #FFD700; text-align: center; }
        input, textarea { width: 100%; background: #111; color: #fff; border: 1px solid #FFD700; padding: 10px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; background: #25d366; border: none; color: #000; font-weight: bold; cursor: pointer; }
        .opinion-card { background: #111; padding: 15px; margin: 10px 0; border-left: 4px solid #FFD700; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #FFD700; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Opiniones</h1>
    <input type="text" id="nombre" placeholder="Tu Nombre">
    <textarea id="texto" placeholder="¿Qué tal fue tu experiencia?"></textarea>
    <button class="btn" onclick="gestionarOpinion()">PUBLICAR Y NOTIFICAR A WILLIAN</button>

    <div id="lista"></div>
</div>

<script>
    window.onload = () => document.getElementById('lista').innerHTML = localStorage.getItem('opiniones') || "";

    function gestionarOpinion() {
        let n = document.getElementById('nombre').value;
        let t = document.getElementById('texto').value;
        if (!n || !t) { alert("Llena los campos, Capitán"); return; }

        // 1. Guardar en la web
        let lista = document.getElementById('lista');
        let div = document.createElement('div');
        div.className = 'opinion-card';
        div.innerHTML = `<div class="avatar">${n[0].toUpperCase()}</div><div><b>${n}</b><br>${t}</div>`;
        lista.prepend(div);
        localStorage.setItem('opiniones', lista.innerHTML);

        // 2. Abrir WhatsApp para que el cliente te avise
        let msg = `Hola Willian, acabo de dejar mi opinión en tu web:\n\nNombre: ${n}\nOpinión: ${t}`;
        window.open("https://wa.me/584248237912?text=" + encodeURIComponent(msg));

        document.getElementById('nombre').value = "";
        document.getElementById('texto').value = "";
    }
</script>
</body>
</html>
