<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opiniones | Los Cócteles de Willian FP</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 120px; }
        .contenedor { max-width: 600px; margin: auto; border: 2px solid #FFD700; padding: 20px; border-radius: 8px; background: #111; }
        h1 { color: #FFD700; text-align: center; text-transform: uppercase; }
        textarea { width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #FFD700; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border-radius: 5px; }
        .btn { width: 100%; padding: 15px; background: #25d366; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1.1em; }
        #lista-opiniones { margin-top: 20px; border-top: 1px solid #FFD700; padding-top: 10px; }
        .opinion { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 5px; border-left: 4px solid #FFD700; }
        .menu-flotante { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px; z-index: 1000; border: 1px solid #d4af37; }
        .menu-flotante a { color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Opiniones</h1>
    <p>Tu legado es importante. ¡Déjanos tu comentario!</p>
    <textarea id="texto-opinion" placeholder="Escribe aquí tu experiencia con Los Cócteles de Willian FP..."></textarea>
    <button class="btn" onclick="agregarOpinion()">PUBLICAR OPINIÓN</button>

    <div id="lista-opiniones">
        <!-- Las opiniones se cargarán aquí automáticamente -->
    </div>
</div>

<nav class="menu-flotante">
    <a href="index.html">Inicio</a>
    <a href="cotizador.html">Cotizar</a>
    <a href="fotos.html">Fotos</a>
    <a href="videos.html">Videos</a>
    <a href="opiniones.html">Opiniones</a>
</nav>

<script>
    // Al cargar la página, recuperamos lo que ya estaba guardado en el navegador
    window.onload = function() {
        let guardadas = localStorage.getItem('misOpiniones');
        if (guardadas) {
            document.getElementById('lista-opiniones').innerHTML = guardadas;
        }
    };

    function agregarOpinion() {
        let texto = document.getElementById('texto-opinion').value;
        if (texto.trim() === "") {
            alert("Por favor, escribe algo antes de publicar.");
            return;
        }

        // Creamos el elemento de la opinión
        let lista = document.getElementById('lista-opiniones');
        let nuevaOpinion = document.createElement('div');
        nuevaOpinion.className = 'opinion';
        nuevaOpinion.innerText = texto;
        
        // Agregamos la nueva opinión arriba de todo
        lista.prepend(nuevaOpinion);
        
        // Guardamos todo el estado actual de la lista en localStorage
        localStorage.setItem('misOpiniones', lista.innerHTML);
        
        // Limpiamos el campo de texto
        document.getElementById('texto-opinion').value = "";
    }
</script>
</body>
</html>
