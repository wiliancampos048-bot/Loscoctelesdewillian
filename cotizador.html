<script>
    function toggleMusica() { var audio = document.getElementById("musicaFondo"); audio.paused ? audio.play() : audio.pause(); }
    
    function actualizar() {
        let total = 0;
        document.querySelectorAll('.input-cant').forEach(i => { total += parseInt(i.value) || 0; });
        document.getElementById('contador').innerText = "Total cócteles: " + total + " / 50";
    }

    function enviar() {
        let total = 0;
        let listaPedido = "";
        
        // Calcular total y construir la lista de productos
        document.querySelectorAll('.input-cant').forEach(i => { 
            let cant = parseInt(i.value) || 0;
            total += cant;
            if(cant > 0) {
                listaPedido += `${i.dataset.nombre}: ${cant}\n`;
            }
        });

        // Validaciones
        if(total < 50) { alert("¡Atención! El mínimo para activar el servicio es de 50 cócteles."); return; }
        if(!document.getElementById('aceptar').checked) { alert("Debes aceptar las condiciones para continuar."); return; }
        
        // Construcción del mensaje profesional
        let msg = `*Nueva Solicitud - Los Cócteles de Willian*\n\n`;
        msg += `👤 Cliente: ${document.getElementById('nombre').value}\n`;
        msg += `👥 Invitados: ${document.getElementById('invitados').value}\n`;
        msg += `📍 Tipo: ${document.getElementById('tipoEvento').value}\n`;
        msg += `📅 Fecha: ${document.getElementById('fecha').value}\n`;
        msg += `🏠 Lugar: ${document.getElementById('lugar').value}\n`;
        msg += `🚚 Fuera de zona: ${document.getElementById('fueraZona').value}\n\n`;
        msg += `*Detalle del Pedido:*\n${listaPedido}`;
        
        // Codificación correcta para WhatsApp
        let url = "https://wa.me/584248237912?text=" + encodeURIComponent(msg);
        window.open(url, '_blank');
    }
</script>
