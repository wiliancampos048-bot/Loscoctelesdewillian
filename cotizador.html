<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador | Los Cócteles de Willian</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .contenedor { max-width: 500px; margin: auto; border: 2px solid #FFD700; padding: 20px; border-radius: 10px; background: #000; }
        h1 { color: #FFD700; text-align: center; font-size: 1.8em; margin-bottom: 10px; text-transform: uppercase; }
        label { color: #FFD700; font-weight: bold; display: block; margin-top: 10px; }
        .campo { width: 100%; padding: 12px; margin: 8px 0; background: #222; color: #fff; border: 1px solid #FFD700; border-radius: 5px; box-sizing: border-box; }
        .btn-enviar { width: 100%; padding: 15px; background: #25d366; border: none; border-radius: 5px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        .btn-secundario { background: #555; }
        .btn-del { background: #ff0000; color: white; border: none; padding: 2px 8px; cursor: pointer; border-radius: 3px; }
        #presupuesto { text-align: center; font-weight: bold; color: #FFD700; margin: 20px 0; font-size: 1.3em; border: 1px solid #FFD700; padding: 10px; }
    </style>
</head>
<body>
<div class="contenedor">
    <h1>Cotizador</h1>
    <input type="text" id="nombre" class="campo" placeholder="Nombre del Cliente" required>
    <input type="tel" id="telefono" class="campo" placeholder="Teléfono del Cliente" required>
    <input type="text" id="direccion" class="campo" placeholder="Dirección del evento" required>
    <input type="date" id="fecha" class="campo">

    <label>Servicios y Productos:</label>
    <select id="productoSelect" class="campo">
        <optgroup label="Parrillas">
            <option value="Parrilla de Solomo" data-precio="20">Parrilla de Solomo ($20)</option>
            <option value="Parrilla de Lomito" data-precio="25">Parrilla de Lomito ($25)</option>
            <option value="Parrilla Punta Nacional" data-precio="20">Parrilla Punta Nacional ($20)</option>
            <option value="Parrilla Angus" data-precio="30">Parrilla Angus ($30)</option>
        </optgroup>
        <optgroup label="Servicios">
            <option value="Bartender" data-precio="70">Bartender ($70)</option>
            <option value="Mesonero" data-precio="65">Mesonero ($65)</option>
            <option value="Parrillero" data-precio="70">Parrillero ($70)</option>
        </optgroup>
        <optgroup label="Cócteles">
            <option value="Piña Colada" data-precio="2">Piña Colada ($2)</option>
            <option value="Daiquiri" data-precio="2">Daiquiri ($2)</option>
            <option value="Ron Punch" data-precio="1.8">Ron Punch ($1.8)</option>
            <option value="Cuba Libre" data-precio="1.8">Cuba Libre ($1.8)</option>
            <option value="Caipiroska" data-precio="1.8">Caipiroska ($1.8)</option>
            <option value="Destornillador" data-precio="1.8">Destornillador ($1.8)</option>
            <option value="Sex on the Beach" data-precio="2.5">Sex on the Beach ($2.5)</option>
            <option value="Mojito Cubano" data-precio="2">Mojito Cubano ($2)</option>
            <option value="Polvo de media noche" data-precio="3">Polvo de media noche ($3)</option>
            <option value="Arcoíris" data-precio="2.5">Arcoíris ($2.5)</option>
            <option value="Tequila Sunrise" data-precio="3">Tequila Sunrise ($3)</option>
            <option value="Canto de Sirena" data-precio="3.5">Canto de Sirena ($3.5)</option>
            <option value="Cóctel Frutos Secos" data-precio="2.5">Cóctel Frutos Secos ($2.5)</option>
            <option value="Coco Loco" data-precio="3">Coco Loco ($3)</option>
            <option value="Orgasmo" data-precio="4">Orgasmo ($4)</option>
            <option value="Orgasmo Múltiple" data-precio="5">Orgasmo Múltiple ($5)</option>
            <option value="Margarita" data-precio="3">Margarita ($3)</option>
            <option value="Magallanes Campeón" data-precio="3">Magallanes Campeón ($3)</option>
        </optgroup>
    </select>
    <input type="number" id="cantidad" class="campo" placeholder="Cantidad" min="1">
    <button class="btn-enviar btn-secundario" onclick="agregarProducto()">AÑADIR A LA LISTA</button>

    <div id="lista-pedido" style="margin-top:15px;"><b>Resumen:</b></div>
    <div id="presupuesto">TOTAL A INVERTIR: $0.00</div>

    <label>Método de pago:</label>
    <select id="pago" class="campo">
        <option value="Efectivo">Efectivo</option>
        <option value="Pago Móvil">Pago Móvil</option>
        <option value="Zelle">Zelle</option>
    </select>

    <textarea id="notas" class="campo" placeholder="Notas adicionales para el evento..."></textarea>

    <input type="checkbox" id="aceptar"> <b>Acepto las condiciones.</b>
    
    <button class="btn-enviar" onclick="enviarWhatsApp()">SOLICITAR PRESUPUESTO</button>
    <button class="btn-enviar btn-secundario" onclick="copiarResumen()">COPIAR RESUMEN</button>
</div>

<script>
    let total = 0; let items = [];
    function agregarProducto() {
        let sel = document.getElementById('productoSelect');
        let opt = sel.options[sel.selectedIndex];
        let cant = document.getElementById('cantidad').value;
        if (!opt.value || cant < 1) return;
        let subtotal = parseFloat(opt.dataset.precio) * cant;
        total += subtotal;
        let id = Date.now();
        items.push({id, desc: cant + "x " + opt.value, precio: subtotal});
        render();
    }
    function render() {
        let lista = document.getElementById('lista-pedido');
        lista.innerHTML = "<b>Resumen:</b>";
        items.forEach(i => {
            lista.innerHTML += `<div>${i.desc} ($${i.precio.toFixed(2)}) <button class="btn-del" onclick="items=items.filter(x=>x.id!==${i.id}); total-=${i.precio}; render()">X</button></div>`;
        });
        document.getElementById('presupuesto').innerText = "TOTAL A INVERTIR: $" + total.toFixed(2);
    }
    function enviarWhatsApp() {
        let nom = document.getElementById('nombre').value;
        if (!nom || !document.getElementById('aceptar').checked) { alert("Complete los campos y acepte condiciones."); return; }
        alert("¡Maestro Willian, tiene una solicitud de nuevo evento!");
        let msg = `NUEVO EVENTO: ${nom}\nFecha: ${document.getElementById('fecha').value}\nItems: ${items.map(i=>i.desc).join(", ")}\nPago: ${document.getElementById('pago').value}\nNotas: ${document.getElementById('notas').value}\nTotal: $${total.toFixed(2)}`;
        window.open("https://wa.me/584248237912?text=" + encodeURIComponent(msg));
    }
    function copiarResumen() {
        let texto = "Resumen de evento:\n" + items.map(i=>i.desc).join("\n") + "\nTotal: $" + total.toFixed(2);
        navigator.clipboard.writeText(texto); alert("Resumen copiado al portapapeles.");
    }
</script>
</body>
</html>
