<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador | Los Cócteles de Willian</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <style>
        .contenedor { max-width: 500px; margin: 20px auto; padding: 20px; background: #1a1a1a; color: #fff; border-radius: 10px; }
        .campo { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; }
        .btn-enviar { width: 100%; padding: 12px; background: #d4af37; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="menu-flotante" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; padding: 10px; border-radius: 20px;">
        <a href="index.html" style="color:white; text-decoration:none;">Volver a Inicio</a>
    </nav>
    <div class="contenedor">
        <h1>Cotizador</h1>
        <input type="text" id="nombre" class="campo" placeholder="Nombre del Cliente">
        <input type="text" id="telefonoCliente" class="campo" placeholder="Teléfono del cliente">
        <input type="text" id="tipoEvento" class="campo" placeholder="Tipo de evento">
        <input type="text" id="direccionEvento" class="campo" placeholder="Dirección del evento">
        <select id="productoSelect" class="campo">
            <option value="">-- Elige un producto --</option>
            <option value="Bartender" data-precio="70">Bartender ($70)</option>
            <option value="Mesonero" data-precio="65">Mesonero ($65)</option>
            <option value="Parrillero" data-precio="70">Parrillero ($70)</option>
        </select>
        <input type="number" id="cantidad" class="campo" placeholder="Cantidad" min="1">
        <button class="btn-enviar" onclick="agregarProducto()">AÑADIR A LA LISTA</button>
        <div id="lista-pedido" style="margin-top:20px;"><b>Resumen:</b></div>
        <div id="presupuesto" style="font-size: 1.2em; font-weight: bold; margin-top:10px;">TOTAL: $0.00</div>
        <input type="checkbox" id="aceptar"> <b>Acepto condiciones.</b><br>
        <button class="btn-enviar" style="margin-top:10px;" onclick="enviarWhatsApp()">SOLICITAR PRESUPUESTO</button>
        <button class="btn-enviar" style="background:#fff; margin-top:10px;" onclick="generarFactura()">GENERAR FACTURA PDF</button>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let total = 0; let items = [];
        function agregarProducto() {
            let select = document.getElementById('productoSelect');
            let opt = select.options[select.selectedIndex];
            let cantidad = document.getElementById('cantidad').value;
            if (opt.value === "" || cantidad < 1) return;
            let subtotal = parseFloat(opt.dataset.precio) * cantidad;
            total += subtotal;
            items.push({id: Date.now(), desc: cantidad + "x " + opt.value, precio: subtotal});
            actualizarLista();
        }
        function eliminarProducto(id) {
            let index = items.findIndex(item => item.id === id);
            total -= items[index].precio;
            items.splice(index, 1);
            actualizarLista();
        }
        function actualizarLista() {
            let lista = document.getElementById('lista-pedido');
            lista.innerHTML = "<b>Resumen:</b>";
            items.forEach(item => {
                lista.innerHTML += "<div>" + item.desc + " ($" + item.precio.toFixed(2) + ") <button onclick='eliminarProducto("+item.id+")' style='background:red; color:white;'>X</button></div>";
            });
            document.getElementById('presupuesto').innerText = "TOTAL: $" + total.toFixed(2);
        }
        function generarFactura() {
            let ventana = window.open('', '_blank');
            ventana.document.write(`
                <div style="font-family: Arial; padding: 20px; border: 2px solid #FFD700;">
                    <img src="mi-logo.png" style="width: 80px;">
                    <h2>Los Cócteles de Willian</h2>
                    <p><strong>Cliente:</strong> ${document.getElementById('nombre').value}</p>
                    <table style="width:100%">${items.map(i => `<tr><td>${i.desc}</td><td style="text-align:right">$${i.precio.toFixed(2)}</td></tr>`).join('')}</table>
                    <h3>TOTAL: $${total.toFixed(2)}</h3>
                    <button onclick="window.print()">IMPRIMIR / PDF</button>
                </div>
            `);
            ventana.document.close();
        }
        function enviarWhatsApp() {
            if(!document.getElementById('aceptar').checked) { alert("Acepte condiciones."); return; }
            let msg = "Nuevo pedido de " + document.getElementById('nombre').value + ": " + items.map(i => i.desc).join(", ") + ". Total: $" + total.toFixed(2);
            window.open("https://wa.me/584248237912?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
