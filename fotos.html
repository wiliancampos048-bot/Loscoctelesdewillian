<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | Los Cócteles de Willian</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 100px; }
        h1 { color: #FFD700; text-align: center; text-transform: uppercase; }
        .galeria-contenedor { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 10px; max-width: 800px; margin: auto; }
        .galeria-item { border: 1px solid #FFD700; border-radius: 8px; overflow: hidden; background: #222; min-height: 150px; }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Menú Flotante */
        .menu-flotante { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); padding: 10px 15px; border-radius: 30px; display: flex; gap: 15px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); z-index: 1000; border: 1px solid #d4af37; font-size: 12px; }
        .menu-flotante a { color: #fff; text-decoration: none; font-weight: bold; }
        .menu-flotante a:hover { color: #d4af37; }
    </style>
</head>
<body>
    <h1>Nuestras Obras</h1>
    
    <div class="galeria-contenedor">
        <div class="galeria-item"><img src="foto1.jpg" alt="Obra 1"></div>
        <div class="galeria-item"><img src="foto2.jpg" alt="Obra 2"></div>
        <div class="galeria-item"><img src="foto3.jpg" alt="Obra 3"></div>
        <div class="galeria-item"><img src="foto4.jpg" alt="Obra 4"></div>
        <div class="galeria-item"><img src="foto5.jpg" alt="Obra 5"></div>
        <div class="galeria-item"><img src="foto6.jpg" alt="Obra 6"></div>
    </div>

    <!-- Menú Flotante -->
    <nav class="menu-flotante">
        <a href="index.html">Inicio</a>
        <a href="cotizador.html">Cotizar</a>
        <a href="fotos.html">Fotos</a>
        <a href="videos.html">Videos</a>
        <a href="opiniones.html">Opiniones</a>
    </nav>
</body>
</html>
