<!DOCTYPE html>

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-top: 80px; background-color: #f4f4f4; }
        
        /* Menú flotante y moderno */
        .menu-flotante {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #333;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .menu-flotante a {
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.3s;
        }
        .menu-flotante a:hover { color: #fff; transform: scale(1.1); }

        header { text-align: center; padding: 20px; background: #fff; }
        section { padding: 40px 20px; }
    </style>
</head>
<body>

    <!-- Menú Flotante -->
    <nav class="menu-flotante">
