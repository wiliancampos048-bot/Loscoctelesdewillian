<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS CÓCTELES DE WILLIAN</title>
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; font-family: Arial, sans-serif; margin: 0; padding-top: 80px; }
        
        /* Menú Flotante */
        .menu { background-color: #000000 !important; border-bottom: 2px solid #FFD700 !important; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 1000; text-align: center; }
        .menu a { color: #FFD700; text-decoration: none; font-weight: bold; margin: 0 5px; font-size: 0.9em; }

        /* Encabezado */
        header { text-align: center; padding: 20px; border-bottom: 2px solid #FFD700; }
        .logo { width: 150px; border-radius: 50%; border: 3px solid #FFD700; }
        h1, h2 { color: #FFD700 !important; text-align: center; }
        
        section { padding: 20px; border-bottom: 1px solid #333; }
        
        /* Galería */
        .grid-galeria { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .galeria-img { width: 100%; border-radius: 10px; border: 1px solid #FFD700; }
        
        .btn-whatsapp { background-color: #25D366; color: white; padding: 15px; border: none; cursor: pointer; display: block; margin: 20px auto; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="menu">
        <a href="#inicio">Inicio</a>
        <a href="#cotizador">Cotizador</a>
        <a href="#galeria">Galería</a>
        <a href="#formacion">Formación</a>
    </nav>

    <header id="inicio">
        <img src="mi-logo.png" class="logo">
        <h1>LOS CÓCTELES DE WILLIAN</h1>
    </header>

    <section id="cotizador">
        <h2>Cotizador y Reservas</h2>
        <input type="text" id="fecha" placeholder="Fecha" style="width:90%; padding:10px; margin:5px auto; display:block; background:#333; color:white; border:1px solid #555;">
        <input type="text" id="lugar" placeholder="Lugar" style="width:90%; padding:10px; margin:5px auto; display:block; background:#333; color:white; border:1px solid #555;">
        <button onclick="enviarPedido()" class="btn-whatsapp">SOLICITAR CONTRATO</button>
    </section>

    <section id="galeria">
        <h2>Galería</h2>
        <div class="grid-galeria">
            <img src="foto-parrilla-destacada.jpg" class="galeria-img">
            <img src="foto-barra-destacada.jpg" class="galeria-img">
            <img src="foto-caterin.png" class="galeria-img">
            <img src="foto-eventos.png" class="galeria-img">
        </div>
    </section>

    <section id="formacion">
        <h2>Aula de Formación</h2>
        <div class="grid-galeria">
            <img src="foto-clase1.png" class="galeria-img">
            <img src="foto-clase2.png" class="galeria-img">
        </div>
    </section>

    <script>
        function enviarPedido() {
            let msg = "Fecha: " + document.getElementById('fecha').value + " Lugar: " + document.getElementById('lugar').value;
            window.open("https://wa.me/584248237912?text=" + msg);
        }
    </script>
</body>
</html>
