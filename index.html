<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS CÓCTELES DE WILLIAN</title>
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .menu { background-color: #000000 !important; border-bottom: 2px solid #FFD700 !important; padding: 15px; text-align: center; }
        .menu a { color: white; text-decoration: none; font-weight: bold; margin: 0 10px; }
        h1, h2, h3 { color: #FFD700 !important; text-align: center; }
        section { padding: 20px; border-bottom: 1px solid #333; }
        .tabla-cotizador { color: #ffffff; width: 100%; max-width: 500px; margin: 20px auto; border-collapse: collapse; }
        .tabla-cotizador td, .tabla-cotizador th { border-bottom: 1px solid #333; padding: 10px; }
        .cantidad { width: 50px; background: #333; color: white; border: 1px solid #555; }
        .btn-whatsapp { background-color: #25D366; color: white; padding: 15px; border: none; cursor: pointer; display: block; margin: 20px auto; }
        img { display: block; margin: 0 auto; width: 150px; border-radius: 50%; }
    </style>
</head>
<body>

    <nav class="menu">
        <a href="#inicio">Inicio</a>
        <a href="#calculadora">Cotizador</a>
        <a href="#parrilla">Parrilla</a>
        <a href="#barra">Barra</a>
    </nav>

    <header id="inicio">
        <img src="mi-logo.png" alt="Logo">
        <h1>LOS CÓCTELES DE WILLIAN</h1>
    </header>

    <section id="calculadora">
        <h2>Cotizador y Reservas</h2>
        <input type="text" id="fecha" placeholder="Fecha" style="width: 90%; display: block; margin: 5px auto; padding: 10px; background: #333; color: white; border: 1px solid #555;">
        <input type="text" id="lugar" placeholder="Lugar" style="width: 90%; display: block; margin: 5px auto; padding: 10px; background: #333; color: white; border: 1px solid #555;">
        
        <table class="tabla-cotizador">
            <tr><th>Producto</th><th>$</th><th>Cant.</th></tr>
            <tr><td>Fruitponch</td><td>2</td><td><input type="number" class="cantidad" data-precio="2" value="0"></td></tr>
            <tr><td>Piña Colada</td><td>2</td><td><input type="number" class="cantidad" data-precio="2" value="0"></td></tr>
            <tr><td>Daiquiri</td><td>2</td><td><input type="number" class="cantidad" data-precio="2" value="0"></td></tr>
            <tr><td>Ron Ponch</td><td>2</td><td><input type="number" class="cantidad" data-precio="2" value="0"></td></tr>
        </table>
        <h3>Total: $<span id="total">0</span></h3>
        <button onclick="enviarPedido()" class="btn-whatsapp">SOLICITAR CONTRATO</button>
    </section>

    <script>
        document.querySelectorAll('.cantidad').forEach(input => {
            input.addEventListener('input', () => {
                let total = 0;
                document.querySelectorAll('.cantidad').forEach(i => { total += i.value * i.dataset.precio; });
                document.getElementById('total').innerText = total.toFixed(2);
            });
        });
        function enviarPedido() {
            let msg = "Fecha: " + document.getElementById('fecha').value + " Total: $" + document.getElementById('total').innerText;
            window.open("https://wa.me/584248237912?text=" + msg);
        }
    </script>
</body>
</html>
