<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS CÓCTELES DE WILLIAN</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <nav class="menu">
        <a href="#inicio">Inicio</a>
        <a href="#cotizador">Cotizador</a>
        <a href="#galeria">Galería</a>
        <a href="#formacion">Formación</a>
    </nav>

    <header id="inicio" class="hero">
        <img src="mi-logo.png" class="logo">
        <h1>LOS CÓCTELES DE WILLIAN</h1>
        <p>32 años de excelencia en Gastronomía, Barra y Parrilla</p>
    </header>

    <section id="cotizador">
        <h2>Cotizador Inteligente</h2>
        <table class="tabla-cotizador">
            <tr><th>Imagen</th><th>Cóctel</th><th>$</th><th>Cant.</th></tr>
            <tr><td><img src="foto-licores.png" width="30"></td><td>Fruit Punch</td><td>1.8</td><td><input type="number" class="cantidad" data-precio="1.8" value="0"></td></tr>
            <tr><td><img src="foto-licores.png" width="30"></td><td>Piña Colada</td><td>2.0</td><td><input type="number" class="cantidad" data-precio="2.0" value="0"></td></tr>
            <tr><td><img src="foto-licores.png" width="30"></td><td>Daiquiri</td><td>1.8</td><td><input type="number" class="cantidad" data-precio="1.8" value="0"></td></tr>
        </table>
        <h3>Total: $<span id="total">0</span></h3>
        <button onclick="enviarPedido()" class="btn-whatsapp">SOLICITAR POR WHATSAPP</button>
    </section>

    <section id="galeria">
        <h2>Galería</h2>
        <div class="galeria-grid">
            <img src="foto-parrilla-destacada.jpg" class="galeria-img">
            <img src="foto-barra-destacada.jpg" class="galeria-img">
        </div>
    </section>

    <section id="formacion">
        <h2>Aula de Formación</h2>
        <div class="galeria-grid">
            <img src="foto-clase1.png" class="galeria-img">
            <img src="foto-clase2.png" class="galeria-img">
        </div>
    </section>

    <script>
        document.querySelectorAll('.cantidad').forEach(input => {
            input.addEventListener('input', () => {
                let total = 0;
                document.querySelectorAll('.cantidad').forEach(i => { total += i.value * i.dataset.precio; });
                document.getElementById('total').innerText = total.toFixed(2);
            });
        });
        function enviarPedido() {
            window.open("https://wa.me/584248237912?text=Total contrato: $" + document.getElementById('total').innerText);
        }
    </script>
</body>
</html>
